<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Takkunu Paaru, Ushara Iru! ⚡👾</title>
    <style>
        body { font-family: 'Poppins', sans-serif; text-align: center; background: #050515; color: #fff; margin: 0; padding: 10px; min-height: 100vh; overflow-x: hidden; }
        .cyber-panel { max-width: 650px; margin: 15px auto; padding: 25px; background: rgba(10, 10, 30, 0.85); border-radius: 20px; border: 3px solid #00f0ff; box-shadow: 0px 0px 25px rgba(0, 240, 255, 0.4); box-sizing: border-box; width: 100%; }
        h1 { color: #ff007f; text-shadow: 0 0 15px #ff007f, 0 0 30px #ff007f; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        h2 { color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        
        /* ⏳ HIGH-SPEED ARCADE RADIAL TIMER BADGE */
        .arcade-timer { background: rgba(255, 0, 127, 0.15); border: 2px solid #ff007f; color: #ff007f; padding: 12px 28px; border-radius: 8px; display: inline-block; font-size: 1.4rem; font-weight: 900; box-shadow: 0 0 15px rgba(255,0,127,0.4); margin: 15px 0; font-family: monospace; }
        
        .clue-stripe-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 25px 0; align-items: center; }
        .neon-clue { background: #111133; border: 2px solid #ff007f; padding: 15px 25px; font-size: 1.8rem; font-weight: bold; border-radius: 12px; box-shadow: 0 0 12px rgba(255, 0, 127, 0.2); text-shadow: 0 0 5px #fff; }
        .pill-neon { background: #061e33; border: 1px solid #00f0ff; padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; color: #00f0ff; display: inline-block; margin: 5px; }
        
        input.arcade-input { padding: 15px; margin: 15px 0; border: 2px solid #00f0ff; background: #000; color: #00f0ff; font-family: monospace; border-radius: 8px; width: 85%; font-size: 1.2rem; text-align: center; outline: none; box-shadow: inset 0 0 8px rgba(0,240,255,0.3); }
        
        .buzzer-arcade-button { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ff0055 0%, #7a0026 100%); color: white; font-size: 1.8rem; font-weight: 900; border: 6px solid #fff; cursor: pointer; display: block; margin: 30px auto; box-shadow: 0 0 40px #ff0055, inset 0 0 20px rgba(255,255,255,0.5); transition: 0.05s; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .buzzer-arcade-button:active { transform: scale(0.94); box-shadow: 0 0 15px #ff0055; }
        .buzzer-arcade-button:disabled { background: #222 !important; border-color: #444 !important; box-shadow: none !important; color: #555 !important; }

        button.cyber-btn { background: linear-gradient(135deg, #00f0ff 0%, #0072ff 100%); color: black; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; margin: 8px; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .btn-magenta { background: linear-gradient(135deg, #ff007f 0%, #b50058 100%); color: white; box-shadow: 0 0 15px rgba(255,0,127,0.4); }
        .mic-arcade { background: #7a1f99; color: white; padding: 10px 20px; font-size: 0.9rem; margin-top: 10px; border: 1px solid #bd00ff; border-radius: 6px; cursor: pointer; }

        .scoreboard-arcade { width: 100%; max-width: 450px; margin: 15px auto; background: #000; border: 2px solid #ff007f; border-radius: 12px; padding: 15px; box-shadow: 0 0 15px rgba(255,0,127,0.2); }
        #game-area, #buzzer-input-pad, #round-feedback-screen, #final-leaderboard-screen { display: none; }
        #startBtn { display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="lobby-box" class="cyber-panel">
        <h1>Takkunu Paaru ⚡<br><span style="color:#00f0ff;">Ushara Iru</span></h1>
        <p id="welcome-label" style="color: #888;">Neon Retro Buzzer Connect Showdown</p>
        <hr style="border: 1px solid rgba(0, 240, 255, 0.2); margin: 20px 0;">
        <input type="text" id="roomCode" class="arcade-input" placeholder="LOBBY KEY (E.g. rcbvibe)"><br>
        <button id="createBtn" class="cyber-btn">Create Hub 🛠️</button>
        <button id="joinBtn" class="cyber-btn btn-magenta">Join Arena 🚀</button>
    </div>

    <div id="game-area" class="cyber-panel">
        <h2 id="round-title-pill">ROUND MATRIX 🎮</h2>
        <div class="pill-neon">Category: <span id="category-display" style="color:#fff;">???</span></div>
        <div class="pill-neon">Crew: <span id="players-list-display" style="color:#fff;">None</span></div>
        <br><br>
        <button id="startBtn" class="cyber-btn btn-magenta" style="font-size: 1.2rem;">Launch Round Fire 🔥</button>

        <div id="active-round-box" style="margin-top: 10px;">
            <div class="arcade-timer">⏳ TIMER: <span id="timer-display">15</span>s</div><br>
            <div id="clues-container-layout" class="clue-stripe-box"></div>
            <button id="buzzerTriggerBtn" class="buzzer-btn buzzer-arcade-button">BUZZ 🚨</button>
        </div>

        <div id="buzzer-input-pad" style="background: #000; padding: 20px; border-radius: 12px; margin-top:15px; border: 2px solid #ff007f;">
            <h3 style="margin-top:0; color:#ff007f;"><span id="lock-winner-label">You</span> Locked the Channel!</h3>
            <input type="text" id="textAnswerField" class="arcade-input" placeholder="Type Answer Here..."><br>
            <button id="submitTypedAnswerBtn" class="cyber-btn btn-magenta">Submit Code 👍</button>
            <button id="micCaptureBtn" class="mic-arcade">🎤 SPEAK ANSWER (Tamil/Eng)</button>
        </div>
    </div>

    <div id="live-running-scoreboard" class="scoreboard-arcade">
        <h3 style="margin:0 0 10px 0; font-size:1rem; color:#00f0ff; text-transform:uppercase; letter-spacing:1px;">Lobby Standings 📊</h3>
        <div id="scorecard-elements-list" style="font-weight:bold; font-family:monospace; line-height:1.6;"></div>
    </div>

    <div id="round-feedback-screen" class="cyber-panel" style="border-color:#ff007f; background:#10000a;">
        <h1 id="round-outcome-header">RESULT MATRIX</h1>
        <p style="font-size:1.2rem; color:#888;">Target Answer: <b id="reveal-correct-word-label" style="color:#00f0ff;">???</b></p>
    </div>

    <div id="final-leaderboard-screen" class="cyber-panel" style="border-color:#ff007f;">
        <h1>🏆 GAME OVER STATUS 🏆</h1>
        <hr style="border-color:#ff007f; margin:15px 0;">
        <div id="final-podium-list" style="font-family:monospace; font-size:1.3rem; text-align:left; line-height:2;"></div>
        <button id="playAgainMasterBtn" class="cyber-btn btn-magenta" style="display:none;">Rematch Round 🔄🔥</button>
        <button onclick="window.location.href='/index.html';" class="cyber-btn" style="background:#222; color:#fff; box-shadow:none;">Exit Hub 🔄</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
