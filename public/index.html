<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Macha Gaming Portal - Authentication Entry 🎮🔐</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #111e36 0%, #070d1a 100%); color: #fff; text-align: center; margin: 0; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .auth-container { max-width: 420px; width: 100%; padding: 30px; background: rgba(22, 36, 71, 0.7); backdrop-filter: blur(12px); border-radius: 20px; border: 2px solid rgba(0, 255, 245, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { color: #00fff5; margin-top: 0; font-size: 1.8rem; text-shadow: 0 0 10px rgba(0, 255, 245, 0.3); }
        input.auth-field { padding: 14px; margin: 10px 0; border: 2px solid #1f4068; background: #162447; color: #fff; border-radius: 10px; width: 100%; font-size: 1rem; outline: none; box-sizing: border-box; text-align: center; }
        input.auth-field:focus { border-color: #00fff5; }
        button.auth-btn { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: black; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 5px 15px rgba(56, 239, 125, 0.3); transition: 0.2s; }
        button.auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(56, 239, 125, 0.5); }
        .toggle-link { color: #00fff5; cursor: pointer; margin-top: 15px; display: inline-block; font-size: 0.9rem; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="auth-title">MACHA ARENA LOGIN 🔐</h1>
        <p id="auth-subtitle" style="color:#94a3b8; font-size:0.9rem; margin-bottom:20px;">Sign in to unlock your virtual gaming hub console.</p>
        
        <input type="text" id="usernameField" class="auth-field" placeholder="Enter Username"><br>
        <input type="password" id="passwordField" class="auth-field" placeholder="Enter Password"><br>
        
        <button onclick="handleAuthenticationExecution();" id="submitActionBtn" class="auth-btn">ENTER PORTAL 🚀</button>
        <br>
        <span onclick="toggleAuthFormMode();" id="formToggleLabel" class="toggle-link">New user? Create account profile here 🔗</span>
    </div>

    <script>
        let currentAuthModeIsLogin = true;

        function toggleAuthFormMode() {
            currentAuthModeIsLogin = !currentAuthModeIsLogin;
            document.getElementById('auth-title').innerText = currentAuthModeIsLogin ? "MACHA ARENA LOGIN 🔐" : "CREATE NEW PROFILE 🚀";
            document.getElementById('submitActionBtn').innerText = currentAuthModeIsLogin ? "ENTER PORTAL 🚀" : "SIGNUP PROFILE 👍";
            document.getElementById('formToggleLabel').innerText = currentAuthModeIsLogin ? "New user? Create account profile here 🔗" : "Already have profiles? Log in here 🔗";
        }

        async function handleAuthenticationExecution() {
            const user = document.getElementById('usernameField').value.trim();
            const pass = document.getElementById('passwordField').value.trim();
            if (!user || !pass) return alert("Fill username and password fields macha!");

            const endpointUrl = currentAuthModeIsLogin ? '/api/login' : '/api/signup';
            
            try {
                const response = await fetch(endpointUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('machaUsername', data.username);
                    localStorage.setItem('machaWins', data.wins || "0");
                    
                    // CRITICAL PARSING SYNCHRONIZATION FIX: Secure mapping validation tokens on BOTH states loops!
                    if (data.uid) {
                        localStorage.setItem('machaUserUID', data.uid);
                    }
                    
                    window.location.replace("./hub.html");
                } else {
                    alert(data.error || "Authentication validation block mismatch!");
                }
            } catch (err) {
                alert("Connection pipeline firewall error sync loop!");
            }
        }
    </script>
</body>
</html>
