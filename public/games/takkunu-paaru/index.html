<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Takkunu Paaru - Tech Light Buzzer ⚡✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root {
            --body-bg: radial-gradient(circle at top left, #f8fafc 0%, #f1f5f9 40%, #e2e8f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #475569;
            --tech-blue: #0066ff;
            --tech-blue-hover: #0052cc;
            --glass-border: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.08);
        }

        body { font-family: 'Poppins', sans-serif; background: var(--body-bg); color: var(--text-main); margin: 0; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        *, *::before, *::after { box-sizing: border-box; }

        .game-mainframe-card { width: 100%; max-width: 620px; background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); backdrop-filter: blur(20px); text-align: center; }
        h1.game-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text-main); margin: 0 0 4px 0; }
        .timer-countdown-banner { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; color: #ff3366; background: rgba(255, 51, 102, 0.05); border: 1px solid rgba(255, 51, 102, 0.12); padding: 5px 16px; border-radius: 8px; display: inline-block; margin-bottom: 8px; }

        .clue-badge-box { background: #ffffff; border: 1px solid rgba(15, 23, 42, 0.05); padding: 10px 16px; border-radius: 12px; margin: 12px 0; box-shadow: var(--card-shadow); display: inline-block; width: 100%; max-width: 420px; }
        .clue-text-element { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--text-main); display: block; margin-top: 4px; }
        
        .premium-buzzer-circle-node {
            width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            border: 5px solid #e2e8f0; margin: 15px auto; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text-muted);
            cursor: pointer; box-shadow: 0 12px 30px -10px rgba(15,23,42,0.1); transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .premium-buzzer-circle-node.buzzer-unlocked-state { border-color: var(--tech-blue); color: var(--tech-blue); }
        .premium-buzzer-circle-node.buzzer-locked-out { border-color: #ff3366; color: #ff3366; background: #fff5f7; }

        .answer-input-field { width: 100%; max-width: 340px; padding: 11px; background: #ffffff; border: 1px solid rgba(15, 23, 42, 0.1); border-radius: 8px; text-align: center; font-family: monospace; font-size: 0.95rem; outline: none; margin-bottom: 8px; }
        button.action-tech-btn { background: var(--text-main); color: #ffffff; border: none; padding: 11px 22px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; width: 100%; max-width: 340px; }

        .leaderboard-dock-card { background: #ffffff; border: 1px solid rgba(15, 23, 42, 0.05); border-radius: 14px; padding: 12px; box-shadow: var(--card-shadow); margin-top: 20px; text-align: left; }
        .leaderboard-row-node { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 5px 0; border-bottom: 1px solid rgba(15, 23, 42, 0.02); }
        button.nav-back-hub-btn { background: transparent; color: var(--text-muted); border: 1px solid rgba(15, 23, 42, 0.1); padding: 6px 14px; border-radius: 6px; font-size: 0.75rem; margin-bottom: 12px; }

        /* 📱 GAME 2 RESPONSIVE BREAKPOINT FILTERS OVERRIDES */
        @media (max-width: 480px) {
            .game-mainframe-card { padding: 15px 12px; border-radius: 16px; }
            h1.game-title { font-size: 1.3rem; }
            .timer-countdown-banner { font-size: 0.85rem; padding: 4px 12px; }
            .clue-badge-box { padding: 8px 12px; margin: 10px 0; }
            .clue-text-element { font-size: 1.05rem; }
            #tp-category-type-label { font-size: 0.68rem; }
            .premium-buzzer-circle-node { width: 130px; height: 130px; font-size: 0.92rem; margin: 12px auto; border-width: 4px; }
            .answer-input-field { max-width: 280px; padding: 9px; font-size: 0.85rem; }
            button.action-tech-btn { max-width: 280px; padding: 10px; font-size: 0.82rem; }
            .leaderboard-dock-card { padding: 10px; border-radius: 12px; margin-top: 15px; }
            .leaderboard-dock-card h4 { font-size: 0.8rem; margin-bottom: 6px; }
            .leaderboard-row-node { font-size: 0.78rem; padding: 4px 0; }
        }
    </style>
</head>
<body>
    <button onclick="window.location.replace('/hub.html');" class="nav-back-hub-btn">⬅ BACK TO LOBBY</button>
    <div class="game-mainframe-card">
        <h1 class="game-title">TAKKUNU PAARU USHARA IRU</h1>
        <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;" id="tp-room-code-label">ROOM CODE: LOADING...</div>
        <div id="tpVisualTimerBanner" class="timer-countdown-banner" style="display:none;">⏱️ BUZZER TIME: 15s</div>

        <div class="clue-badge-box">
            <span style="font-size:0.7rem; text-transform:uppercase; color:var(--text-muted); font-weight:700; letter-spacing:0.5px;" id="tp-category-type-label">CATEGORY INDICATORS</span>
            <span class="clue-text-element" id="tp-active-clues-display-node">WAITING TO IGNITE DATASTREAM...</span>
        </div>

        <div onclick="executeBuzzerStrikeAction();" id="tpBuzzerNode" class="premium-buzzer-circle-node buzzer-unlocked-state">STRIKE BUZZER ⚡</div>

        <div id="inputCaptureInterfaceBlock" style="display: none; margin: 10px auto;">
            <input type="text" id="submittedAnswerInputField" class="answer-input-field" placeholder="Type Answer Here..."><br>
            <button onclick="executeAnswerSubmissionAction();" class="action-tech-btn">SUBMIT TO DATABASE ARRAY 🚀</button>
        </div>

        <button onclick="triggerAdminGameStartIgnition();" id="tpAdminStartBtn" class="action-tech-btn" style="display:none; background:var(--tech-blue); font-size:0.88rem; padding:12px;">IGNITE ROUND (ADMIN) 🚀</button>
        <button onclick="triggerAdminRematchReset();" id="tpAdminRematchBtn" class="action-tech-btn" style="display:none; background:#ffaa00;">PLAY AGAIN 🔄</button>

        <div class="leaderboard-dock-card">
            <h4 style="margin:0 0 8px 0; font-family:'Space Grotesk'; color:var(--text-main); border-bottom:1px solid rgba(0,0,0,0.05); padding-bottom:4px; font-size:0.85rem;">LOBBY LEADERBOARD ARRAY</h4>
            <div id="tpLeaderboardRenderPad"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || "Macha_Buzzer"; let targetRoomCodeKey = urlParams.get('room') || "DEFAULT";
        let actionIntent = urlParams.get('action') || "join"; let isLobbyAdmin = false; let tpCountdownTimerObject = null;

        if (actionIntent === "create") { socket.emit('tp_createNewRoom', { roomCode: targetRoomCodeKey, username }); } 
        else { socket.emit('tp_joinExistingRoom', { roomCode: targetRoomCodeKey, username }); }
        document.getElementById('tp-room-code-label').innerText = `LOBBY MATRIX ROOM CODE: ${targetRoomCodeKey}`;

        socket.on('tp_roomSuccess', () => console.log("Buzzer portal mapped successfully."));
        socket.on('tp_roomError', (msg) => { alert(msg); window.location.replace('/hub.html'); });

        socket.on('tp_roomData', ({ players, adminId }) => {
            isLobbyAdmin = (socket.id === adminId); const pad = document.getElementById('tpLeaderboardRenderPad');
            pad.innerHTML = players.map(p => `<div class="leaderboard-row-node"><span style="font-weight:500;">👤 ${p.name.toUpperCase()}</span><span style="font-weight:700; color:var(--tech-blue);">${p.score} PTS</span></div>`).join('');
            if (isLobbyAdmin && document.getElementById('tp-active-clues-display-node').innerText.includes("WAITING")) {
                document.getElementById('tpAdminStartBtn').style.display = "inline-block";
            }
        });

        function triggerAdminGameStartIgnition() { document.getElementById('tpAdminStartBtn').style.display = "none"; socket.emit('tp_startMatchTrigger', targetRoomCodeKey); }

        socket.on('tp_nextRoundStarted', ({ round, clues, type }) => {
            document.getElementById('tp-category-type-label').innerText = `ROUND ${round} / 10 | ${type.toUpperCase()}`;
            document.getElementById('tp-active-clues-display-node').innerText = clues.join(' ➡️ ');
            const b = document.getElementById('tpBuzzerNode'); b.className = "premium-buzzer-circle-node buzzer-unlocked-state"; b.innerText = "STRIKE BUZZER ⚡";
            document.getElementById('inputCaptureInterfaceBlock').style.display = "none"; document.getElementById('submittedAnswerInputField').value = "";

            clearInterval(tpCountdownTimerObject); const timerBanner = document.getElementById('tpVisualTimerBanner'); timerBanner.style.display = "inline-block";
            let secondsLeft = 15; timerBanner.innerText = `⏱️ BUZZER: ${secondsLeft}s`;
            tpCountdownTimerObject = setInterval(() => { secondsLeft--; timerBanner.innerText = `⏱️ BUZZER: ${secondsLeft}s`; if (secondsLeft <= 0) { clearInterval(tpCountdownTimerObject); timerBanner.style.display = "none"; } }, 1000);
        });

        function executeBuzzerStrikeAction() { const b = document.getElementById('tpBuzzerNode'); if(b.classList.contains('buzzer-locked-out')) return; socket.emit('tp_buzzerPressed', targetRoomCodeKey); }

        socket.on('tp_buzzerLockedEvent', ({ winnerId, winnerName }) => {
            clearInterval(tpCountdownTimerObject); document.getElementById('tpVisualTimerBanner').style.display = "none";
            const b = document.getElementById('tpBuzzerNode'); b.className = "premium-buzzer-circle-node buzzer-locked-out"; b.innerText = `LOCKED: ${winnerName.toUpperCase()} 🔒`;
            if (socket.id === winnerId) { document.getElementById('inputCaptureInterfaceBlock').style.display = "block"; document.getElementById('submittedAnswerInputField').focus(); }
        });

        function executeAnswerSubmissionAction() { const val = document.getElementById('submittedAnswerInputField').value.trim(); if(!val) return alert("Type answer value!"); socket.emit('tp_submitAnswer', { roomCode: targetRoomCodeKey, submittedAnswer: val }); document.getElementById('inputCaptureInterfaceBlock').style.display = "none"; }

        socket.on('tp_roundOutcome', ({ playerName, isCorrect, actualAnswer, players }) => {
            clearInterval(tpCountdownTimerObject); document.getElementById('tpVisualTimerBanner').style.display = "none";
            document.getElementById('tp-active-clues-display-node').innerText = `ANSWER: ${actualAnswer.toUpperCase()}`;
            document.getElementById('tpBuzzerNode').innerText = `${playerName.toUpperCase()} ${isCorrect ? 'RIGHT! ✅' : 'WRONG! ❌'}`;
            const pad = document.getElementById('tpLeaderboardRenderPad'); pad.innerHTML = players.map(p => `<div class="leaderboard-row-node"><span style="font-weight:500;">👤 ${p.name.toUpperCase()}</span><span style="font-weight:700; color:var(--tech-blue);">${p.score} PTS</span></div>`).join('');
        });

        socket.on('tp_roundTimeoutExpired', ({ actualAnswer, players }) => { clearInterval(tpCountdownTimerObject); document.getElementById('tpVisualTimerBanner').style.display = "none"; document.getElementById('tp-active-clues-display-node').innerText = `TIMEOUT! ANSWER: ${actualAnswer.toUpperCase()}`; document.getElementById('tpBuzzerNode').innerText = "EXPIRED ⏳"; });
        socket.on('tp_gameFinished', ({ leaderboard }) => { clearInterval(tpCountdownTimerObject); document.getElementById('tpVisualTimerBanner').style.display = "none"; document.getElementById('tp-category-type-label').innerText = "MATCH SUMMARY"; document.getElementById('tp-active-clues-display-node').innerText = `WINNER: ${leaderboard[0].name.toUpperCase()} 👑`; document.getElementById('tpBuzzerNode').innerText = "GAME OVER 🏁"; if (isLobbyAdmin) document.getElementById('tpAdminRematchBtn').style.display = "inline-block"; });
        function triggerAdminRematchReset() { document.getElementById('tpAdminRematchBtn').style.display = "none"; socket.emit('tp_playAgainAction', targetRoomCodeKey); }
    </script>
</body>
</html>
